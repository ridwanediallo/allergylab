name: AllergyLab CI/CD

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Build image
        run: |
          cd Part7a
          docker build -t ${{ secrets.DOCKER_USERNAME }}/al-app:latest ./app
          docker build -t ${{ secrets.DOCKER_USERNAME }}/al-db-loader:latest ./db-loader
          docker build -t ${{ secrets.DOCKER_USERNAME }}/al-email:latest ./email
      - name: Verify secrets are set
        run: |
          echo "Username length: ${#DOCKER_USER}"
          echo "Token length: ${#DOCKER_TOKEN}"
          echo "Username first char: ${DOCKER_USER:0:1}"
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
